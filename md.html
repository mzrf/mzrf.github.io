<!DOCTYPE html>
<html lang="zh-CN">

    <style>
        *{margin:0;padding:0;box-sizing:border-box}:root{--bg:#3c3f41;--sidebar:#313335;--content:#2b2b2b;--text:#a9b7c6;--text-muted:#808080;--border:#515151;--accent:#589df6;--code-bg:#2b2b2b;--success:#6a8759;--heading:#ffc66d;--link:#6897bb}body{font-family:Maple Mono,'Source Code Pro',monospace;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:13px}.toolbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;gap:6px;align-items:center}.toolbar button{background:var(--content);color:var(--text);border:1px solid var(--border);padding:5px 12px;border-radius:3px;cursor:pointer;font-size:12px;font-family:inherit}.toolbar button:hover{background:#4e5254;border-color:var(--accent)}.toolbar .spacer{flex:1}.toolbar .status{font-size:11px;color:var(--text-muted)}.main{display:flex;flex:1;overflow:hidden}.sidebar{width:220px;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:12px;flex-shrink:0}.sidebar h3{font-size:11px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;letter-spacing:.5px;font-weight:normal}.toc{list-style:none}.toc-item a{display:block;padding:3px 6px;color:var(--text-muted);text-decoration:none;border-radius:2px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toc-item a:hover{background:var(--content);color:var(--text)}.toc-h1{padding-left:0}.toc-h2{padding-left:12px}.toc-h3{padding-left:24px}.toc-h4{padding-left:36px}.toc-folder{cursor:pointer;user-select:none;display:flex;align-items:center;padding:3px 6px;color:var(--text);font-size:12px}.toc-folder:before{content:'>';display:inline-block;width:12px;transition:transform .15s;font-size:10px}.toc-folder.open:before{transform:rotate(90deg)}.toc-children{display:none;margin-left:10px}.toc-children.show{display:block}.editor-wrap{flex:1;overflow-y:auto;padding:20px 40px}.block{padding:4px 8px;border-radius:3px;margin:2px 0;cursor:text;line-height:1.6;min-height:1.6em}.block:hover{background:rgba(255,255,255,.03)}.block.editing{background:var(--code-bg);outline:1px solid var(--border)}.block textarea{width:100%;background:transparent;border:none;color:var(--text);font:inherit;resize:none;outline:none;line-height:1.6;overflow:hidden}.empty-block{color:var(--text-muted);font-style:italic;min-height:2em}h1,h2,h3,h4,h5,h6{color:var(--heading);font-weight:normal;margin:16px 0 8px}h1{font-size:1.8em;border-bottom:1px solid var(--border);padding-bottom:6px}h2{font-size:1.5em}h3{font-size:1.25em}h4{font-size:1.1em}a{color:var(--link)}code{background:var(--code-bg);padding:2px 6px;border-radius:3px;font-size:0.9em;color:#e8bf6a}pre{background:var(--code-bg);padding:12px;border-radius:4px;overflow-x:auto;border:1px solid var(--border);margin:8px 0}pre code{padding:0;background:none}.kw{color:#cc7832}.str{color:#6a8759}.num{color:#6897bb}.cm{color:#808080;font-style:italic}.fn{color:#ffc66d}.op{color:#a9b7c6}blockquote{border-left:3px solid var(--accent);padding-left:15px;color:var(--text-muted);margin:0}ul,ol{padding-left:24px;margin:8px 0}li{margin:4px 0}table{border-collapse:collapse;width:100%;margin:12px 0}th,td{border:1px solid var(--border);padding:8px 12px;text-align:left}th{background:var(--sidebar);color:var(--heading)}tr:nth-child(even){background:rgba(255,255,255,.02)}img{max-width:100%;border-radius:4px;margin:8px 0}.mermaid-placeholder{background:var(--code-bg);border:1px dashed var(--border);padding:20px;text-align:center;color:var(--text-muted);border-radius:4px;margin:8px 0}.mermaid-placeholder button{margin-top:10px}.mermaid svg{max-width:100%}.toc-container{max-height:calc(100vh - 100px);overflow-y:auto}.toc-list{list-style:none;padding-left:0;}.toc-folder:hover{background:var(--content);}.toc-folder-toggle{font-size:10px;width:12px;height:12px;display:inline-flex;align-items:center;justify-content:center;}.toc-children{margin-left:12px;border-left:1px dashed var(--border);padding-left:8px;}.toc-item{margin:2px 0;}.toc-item a{display:block;padding:6px 8px;color:var(--text-muted);text-decoration:none;border-radius:3px;font-size:12px;transition:all 0.2s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:2px 0;}.toc-item a:hover{background:var(--content);color:var(--text);}.toc-h1{font-weight:600;color:var(--heading);}.toc-h2{color:var(--text);}.toc-h3{color:var(--text-muted);font-size:11px;}.toc-h4{color:var(--text-muted);font-size:10px;opacity:0.8;}.toc-h5{color:var(--text-muted);font-size:10px;opacity:0.6;}pre[class*="language-"],code[class*="language-"]{color:#D4D4D4;background:none;font-family:Maple Mono,'Source Code Pro',monospace;font-size:13px;text-align:left;white-space:pre;word-spacing:normal;word-break:normal;word-wrap:normal;line-height:1.6;tab-size:4;hyphens:none;}pre[class*="language-"]{padding:12px;margin:8px 0;overflow:auto;border-radius:4px;background:var(--code-bg);border:1px solid var(--border);}:not(pre) > code[class*="language-"]{padding:2px 6px;border-radius:3px;background:var(--code-bg);white-space:normal;}.token.comment,.token.block-comment,.token.prolog,.token.doctype,.token.cdata{color:#6A9955;font-style:italic;}.token.punctuation{color:#D4D4D4;}.token.keyword,.token.atrule,.token.selector{color:#569CD6;}.token.operator,.token.entity,.token.url,.token.variable{color:#D4D4D4;}.token.string,.token.char,.token.attr-value{color:#CE9178;}.token.number,.token.boolean{color:#B5CEA8;}.token.function,.token.function-variable{color:#DCDCAA;}.token.class-name,.token.type{color:#4EC9B0;}.token.constant,.token.symbol{color:#9CDCFE;}.token.builtin,.token.property{color:#9CDCFE;}.token.tag{color:#569CD6;}.token.attr-name{color:#9CDCFE;}.token.unit,.token.color-hex{color:#B5CEA8;}.token.regex{color:#D16969;}.token.error{color:#F44747;border-bottom:1px solid #F44747;}.token.important,.token.bold{font-weight:bold;}.token.italic{font-style:italic;}pre.line-numbers{position:relative;padding-left:3.8em;counter-reset:linenumber;}pre.line-numbers > code{position:relative;white-space:inherit;}.line-numbers .line-numbers-rows{position:absolute;pointer-events:none;top:0;font-size:100%;left:-3.8em;width:3em;letter-spacing:-1px;border-right:1px solid var(--border);user-select:none;}.line-numbers-rows > span{display:block;counter-increment:linenumber;color:#808080;padding-right:0.8em;text-align:right;}.line-highlight{position:absolute;left:0;right:0;padding:inherit 0;margin-top:1em;background:rgba(255,255,255,0.04);pointer-events:none;line-height:inherit;white-space:pre;}
    </style>
</head>
<body>
    <div class="toolbar"><button onclick="newFile()">New</button><button onclick="openFile()">Open</button><button onclick="saveFile()">Save</button>
        <div class="spacer"></div><span class="status" id="status">Ready</span>
    </div>
    <div class="main">
        <div class="sidebar">
            <h3>Contents</h3>
            <div id="toc"></div>
        </div>
        <div class="editor-wrap" id="editor"></div>
    </div>
    <script src="./lib/prism.js"></script>
    <script>
let md='# Welcome',fh=null,mermaidLoaded=false,mermaidQueue=[];let isSaved=false;const kw=/\\b(function|return|const|let|var|if|else|for|while|class|import|export|from|async|await|try|catch|new|this|true|false|null|undefined|typeof|instanceof|switch|case|break|continue|default|throw|extends|super|static|get|set|of|in|public|private|protected|interface|type|enum|implements|abstract|readonly|declare|namespace|module|require|yield|void|delete|with|as|is)\\b/g;const builtins=/\\b(console|window|document|Array|Object|String|Number|Boolean|Function|Promise|Map|Set|Math|JSON|Date|RegExp|Error|parseInt|parseFloat|setTimeout|setInterval|fetch)\\b/g;function slugify(text){return text.toLowerCase().trim().replace(/[^\w\s-]/g,'').replace(/[\s_-]+/g,'-').replace(/^-+|-+$/g,'')}function hl(code,lang){const langMap={js:'javascript',ts:'typescript',shell:'bash',sh:'bash',csh:'bash',zsh:'bash',command:'bash',py:'python',rb:'ruby',go:'go',java:'java',c:'c',cpp:'cpp','c++':'cpp',rust:'rust',rs:'rust',json:'json',xml:'xml',html:'html',htm:'html',css:'css'};const standardLang=langMap[lang.toLowerCase()]||lang.toLowerCase();if(!Prism.languages[lang]){console.error(`Prism不支持${standardLang}语言，请引入对应扩展JS`);return`<pre class="highlight-code"><code>${code}</code></pre>`}const highlightedCode=Prism.highlight(code,Prism.languages[standardLang],standardLang);return`${highlightedCode}`}function esc(s){if(typeof s!=='string')s=String(s||'');return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function parseMd(t,lineOffset=0){let h=[];const lines=t.split('\n');let html='',inCode=false,codeLang='',codeContent='',inTable=false,tableRows=[];for(let i=0;i<lines.length;i++){let ln=lines[i];if(ln.startsWith('```')){if(inCode){if(codeLang==='mermaid'){html+=renderMermaid(codeContent.trim())}else{html+='<pre><code>'+hl(codeContent,codeLang)+'</code></pre>'}inCode=false;codeContent='';codeLang=''}else{inCode=true;codeLang=ln.slice(3).trim();codeContent=''}continue}if(inCode){codeContent+=ln+'\n';continue}if(ln.match(/^\|.*\|$/)){if(!inTable){inTable=true;tableRows=[]}tableRows.push(ln);continue}else if(inTable){html+=renderTable(tableRows);inTable=false;tableRows=[]}if(ln.startsWith('######')){const txt=ln.slice(6).trim();const id=slugify(txt)+'-'+(i+lineOffset);h.push({l:6,t:txt,id:id});html+='<h6 id="'+id+'">'+inline(txt)+'</h6>'}else if(ln.startsWith('#####')){const txt=ln.slice(5).trim();const id=slugify(txt)+'-'+(i+lineOffset);h.push({l:5,t:txt,id:id});html+='<h5 id="'+id+'">'+inline(txt)+'</h5>'}else if(ln.startsWith('####')){const txt=ln.slice(4).trim();const id=slugify(txt)+'-'+(i+lineOffset);h.push({l:4,t:txt,id:id});html+='<h4 id="'+id+'">'+inline(txt)+'</h4>'}else if(ln.startsWith('###')){const txt=ln.slice(3).trim();const id=slugify(txt)+'-'+(i+lineOffset);h.push({l:3,t:txt,id:id});html+='<h3 id="'+id+'">'+inline(txt)+'</h3>'}else if(ln.startsWith('##')){const txt=ln.slice(2).trim();const id=slugify(txt)+'-'+(i+lineOffset);h.push({l:2,t:txt,id:id});html+='<h2 id="'+id+'">'+inline(txt)+'</h2>'}else if(ln.startsWith('#')){const txt=ln.slice(1).trim();const id=slugify(txt)+'-'+(i+lineOffset);h.push({l:1,t:txt,id:id});html+='<h1 id="'+id+'">'+inline(txt)+'</h1>'}else if(ln.startsWith('>')){html+='<blockquote>'+inline(ln.slice(1).trim())+'</blockquote>'}else if(ln.match(/^[-*]\s/)){html+='<ul><li>'+inline(ln.slice(2))+'</li></ul>'}else if(ln.match(/^\d+\.\s/)){html+='<ol><li>'+inline(ln.replace(/^\d+\.\s/,''))+'</li></ol>'}else if(ln.startsWith('![')&&ln.includes('](')){const m=ln.match(/!\[(.*?)\]\((.*?)\)/);if(m)html+='<img alt="'+esc(m[1])+'" src="'+esc(m[2])+'">'}else if(ln.trim()===''){html+='<br>'}else{html+='<p>'+inline(ln)+'</p>'}}if(inCode){if(codeLang==='mermaid'){html+=renderMermaid(codeContent.trim())}else{html+='<pre><code>'+hl(codeContent,codeLang)+'</code></pre>'}}if(inTable)html+=renderTable(tableRows);return{html,headings:h}}function renderTable(rows){if(rows.length<2)return'';let html='<table><thead><tr>';const hCells=rows[0].split('|').filter(c=>c.trim());hCells.forEach(c=>html+='<th>'+inline(c.trim())+'</th>');html+='</tr></thead><tbody>';for(let i=2;i<rows.length;i++){html+='<tr>';const cells=rows[i].split('|').filter(c=>c.trim());cells.forEach(c=>html+='<td>'+inline(c.trim())+'</td>');html+='</tr>'}html+='</tbody></table>';return html}function renderMermaid(code){const id='mm'+Math.random().toString(36).slice(2);if(mermaidLoaded){return'<div class="mermaid" id="'+id+'">'+esc(code)+'</div>'}else{mermaidQueue.push({id,code});return'<div class="mermaid-placeholder" id="'+id+'" data-code="'+esc(code)+'">Mermaid Diagram<br><button onclick="loadMermaid()">Load Diagram Engine</button></div>'}}function loadMermaid(){if(mermaidLoaded)return;const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js';s.onload=()=>{mermaidLoaded=true;mermaid.initialize({startOnLoad:false,theme:'dark'});document.querySelectorAll('.mermaid-placeholder').forEach(el=>{const code=el.getAttribute('data-code');el.className='mermaid';el.innerHTML=code;mermaid.run({nodes:[el]})})};document.head.appendChild(s)}function inline(t){t=esc(t);t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');t=t.replace(/`(.+?)`/g,'<code>$1</code>');t=t.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>');return t}function render(){const blocks=md.split(/\n\n+/);const editor=document.getElementById('editor');editor.innerHTML='';let totalLines=0;let allHeadings=[];blocks.forEach((b,i)=>{const div=document.createElement('div');div.className='block';div.dataset.idx=i;const{html,headings}=parseMd(b,totalLines);headings.forEach(h=>allHeadings.push(h));div.innerHTML=html||'<br>';div.onclick=e=>editBlock(div,i,b,e);editor.appendChild(div);totalLines+=b.split('\n').length+2});const empty=document.createElement('div');empty.className='block empty-block';empty.innerHTML='Click to add content...';empty.onclick=()=>editBlock(empty,-1,'');editor.appendChild(empty);buildToc(allHeadings);if(mermaidLoaded){setTimeout(()=>mermaid.run(),50)}}function insertAtCursor(textarea,text){const start=textarea.selectionStart;const end=textarea.selectionEnd;const value=textarea.value;textarea.value=value.substring(0,start)+text+value.substring(end);textarea.selectionStart=textarea.selectionEnd=start+text.length;textarea.oninput()}function editBlock(div,idx,txt,ev){if(div.classList.contains('editing'))return;document.querySelectorAll('.block.editing').forEach(b=>{const ta=b.querySelector('textarea');if(ta)saveBlock(b,parseInt(b.dataset.idx),ta.value)});div.classList.add('editing');const ta=document.createElement('textarea');ta.value=txt;div.innerHTML='';div.appendChild(ta);ta.style.height=ta.scrollHeight+'px';ta.oninput=()=>{ta.style.height=ta.scrollHeight+'px';isSaved=false};ta.onblur=()=>{if(idx===-1&&ta.value.trim()){md=md.trimEnd()+'\n\n'+ta.value}else if(idx>=0){saveBlock(div,idx,ta.value)}render()};ta.onkeydown=e=>{if(e.key==='Escape'){ta.blur()}};ta.focus();if(ev){const rect=div.getBoundingClientRect();const x=ev.clientX-rect.left;const y=ev.clientY-rect.top;const range=document.caretRangeFromPoint?document.caretRangeFromPoint(ev.clientX,ev.clientY):null;if(range&&txt){const lines=txt.split('\n');let pos=0,found=false;const lineH=parseFloat(getComputedStyle(ta).lineHeight)||20;const clickLine=Math.floor(y/lineH);for(let i=0;i<clickLine&&i<lines.length;i++)pos+=lines[i].length+1;const charW=8;pos+=Math.min(Math.floor(x/charW),lines[clickLine]?.length||0);ta.setSelectionRange(Math.min(pos,txt.length),Math.min(pos,txt.length))}}}function saveBlock(div,idx,val){const blocks=md.split(/\n\n+/);blocks[idx]=val;md=blocks.join('\n\n');isSaved=false}async function saveFile(){try{if(!fh){fh=await window.showSaveFilePicker({suggestedName:'document.md',types:[{description:'Markdown',accept:{'text/markdown':['.md']}}]})}const w=await fh.createWritable();await w.write(md);await w.close();isSaved=true;status('Saved!')}catch(e){if(e.name!=='AbortError'){status('Error saving');isSaved=false}}}function buildToc(headings){const toc=document.getElementById('toc');toc.innerHTML='';if(headings.length===0){return}const container=document.createElement('div');container.className='toc-container';const buildHierarchy=(items,minLevel=1)=>{const root={children:[]};const stack=[{level:minLevel-1,node:root}];items.forEach(item=>{const{l:level}=item;while(stack.length>1&&stack[stack.length-1].level>=level){stack.pop()}const parent=stack[stack.length-1].node;const currentNode={...item,children:[]};parent.children.push(currentNode);stack.push({level:level,node:currentNode})});return root.children};const renderLevel=(items,depth=0)=>{if(items.length===0)return null;const ul=document.createElement('ul');ul.className='toc-list';ul.style.marginLeft=depth>0?'6px':'0';items.forEach(item=>{const li=document.createElement('li');li.className='toc-item';if(item.children&&item.children.length>0){const folderDiv=document.createElement('div');folderDiv.className='toc-folder';folderDiv.innerHTML=`<span class="toc-folder-toggle">▼</span><span class="toc-folder-text">${item.t}</span>`;const subContainer=document.createElement('div');subContainer.className='toc-children';subContainer.style.display='block';const childList=renderLevel(item.children,depth+1);if(childList){subContainer.appendChild(childList)}folderDiv.onclick=(e)=>{e.stopPropagation();const toggleSpan=folderDiv.querySelector('.toc-folder-toggle');if(subContainer.style.display==='none'){subContainer.style.display='block';toggleSpan.textContent='▼'}else{subContainer.style.display='none';toggleSpan.textContent='▶'}};li.appendChild(folderDiv);li.appendChild(subContainer)}else{const a=document.createElement('a');a.href='#'+item.id;a.textContent=item.t;a.className='toc-h'+item.l;a.style.paddingLeft=6+'px';a.onclick=(e)=>{e.preventDefault();const target=document.getElementById(item.id);if(target){target.scrollIntoView({behavior:'smooth'});target.style.backgroundColor='#3c3f41';setTimeout(()=>target.style.backgroundColor='',1000)}};li.appendChild(a)}ul.appendChild(li)});return ul};const hierarchy=buildHierarchy(headings);const tree=renderLevel(hierarchy);if(tree){container.appendChild(tree);toc.appendChild(container)}}document.addEventListener('paste',async e=>{const items=e.clipboardData?.items;if(!items)return;const activeTextarea=document.querySelector('.block.editing textarea');if(activeTextarea){for(const item of items){if(item.type.startsWith('image/')){e.preventDefault();const blob=item.getAsFile();const reader=new FileReader();reader.onload=()=>{const b64=reader.result;insertAtCursor(activeTextarea,`![image](${b64})`);status('Image pasted at cursor');isSaved=false};reader.readAsDataURL(blob);break}}}else{for(const item of items){if(item.type.startsWith('image/')){e.preventDefault();const blob=item.getAsFile();const reader=new FileReader();reader.onload=()=>{const b64=reader.result;md=md.trimEnd()+'\n\n![image]('+b64+')\n';render();status('Image pasted');isSaved=false};reader.readAsDataURL(blob);break}}}});async function newFile(){md='# New Document\n\nStart writing...';fh=null;isSaved=false;render();status('New file')}async function openFile(){try{[fh]=await window.showOpenFilePicker({types:[{description:'Markdown',accept:{'text/markdown':['.md']}}]});const file=await fh.getFile();md=await file.text();isSaved=true;render();status('Opened: '+file.name)}catch(e){if(e.name!=='AbortError')status('Error opening')}}function status(t){document.getElementById('status').textContent=t;setTimeout(()=>document.getElementById('status').textContent='Ready',2000)}window.addEventListener('beforeunload',async(e)=>{if(isSaved)return;try{e.preventDefault();e.returnValue='';if(fh){const w=await fh.createWritable();await w.write(md);await w.close();isSaved=true;status('Auto-saved before exit')}else{fh=await window.showSaveFilePicker({suggestedName:'document.md',types:[{description:'Markdown',accept:{'text/markdown':['.md']}}]});const w=await fh.createWritable();await w.write(md);await w.close();isSaved=true;status('Auto-saved before exit')}}catch(err){if(err.name!=='AbortError'){console.error('Auto-save failed:',err)}}});render();
